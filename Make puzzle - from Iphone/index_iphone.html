    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        background: black;
        touch-action: none;
        overscroll-behavior: none;
      }

      body {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      canvas {
        display: block;
        width: min(100vw, 100vh) !important;
        height: min(100vw, 100vh) !important;
        width: min(100vw, 100dvh) !important;
        height: min(100vw, 100dvh) !important;
        max-width: 100vw;
        max-height: 100dvh;
        touch-action: none;
      }

      .dg.ac {
        transform: scale(0.78);
        transform-origin: top right;
        right: env(safe-area-inset-right);
        top: env(safe-area-inset-top);
        z-index: 20;
      }

      .dg.ac .dg.main {
        max-height: calc(100dvh - 84px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .iphone-controls {
        position: fixed;
        z-index: 30;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 7px;
        pointer-events: auto;
      }

      .iphone-control-button {
        appearance: none;
        -webkit-appearance: none;
        min-width: 48px;
        height: 38px;
        padding: 0 9px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        background: rgba(7, 10, 14, 0.68);
        color: white;
        font: 600 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .iphone-control-button.is-active,
      .iphone-control-button:active {
        background: rgba(255, 255, 255, 0.9);
        color: black;
      }

      .desktop-save-button {
        z-index: 5;
      }

      .project-date-badge {
        position: fixed;
        z-index: 28;
        right: max(10px, env(safe-area-inset-right));
        bottom: max(56px, calc(env(safe-area-inset-bottom) + 56px));
        padding: 4px 7px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.56);
        color: rgba(255, 255, 255, 0.84);
        font: 700 10px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        pointer-events: none;
      }

      .camera-test-tools {
        position: fixed;
        z-index: 90;
        top: max(10px, env(safe-area-inset-top));
        left: max(10px, env(safe-area-inset-left));
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-width: calc(100vw - 20px);
        pointer-events: auto;
      }

      .camera-test-button,
      .camera-debug-close {
        appearance: none;
        -webkit-appearance: none;
        min-height: 34px;
        padding: 0 9px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: white;
        font: 700 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .camera-debug-close {
        display: none;
      }

      body.camera-debug-open .camera-debug-close {
        display: inline-block;
      }

      .iphone-gui-close-button {
        appearance: none;
        -webkit-appearance: none;
        position: fixed;
        z-index: 96;
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        display: none;
        min-height: 38px;
        padding: 0 11px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: black;
        font: 800 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        pointer-events: auto;
      }

      body.mobile-ui-active.gui-open .iphone-gui-close-button {
        display: block;
      }

      .camera-debug-panel {
        position: fixed;
        z-index: 89;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        top: max(52px, calc(env(safe-area-inset-top) + 52px));
        display: none;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 8px;
        max-height: min(48dvh, 380px);
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.84);
        color: white;
        pointer-events: auto;
      }

      body.camera-debug-open .camera-debug-panel {
        display: grid;
      }

      .camera-debug-video {
        width: 96px;
        height: 128px;
        border-radius: 6px;
        background: #111;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .camera-debug-output {
        min-width: 0;
        max-height: calc(min(48dvh, 380px) - 18px);
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font: 10px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="project-date-badge" aria-label="Date du projet">08/07/2026</div>
    <div class="camera-test-tools" aria-label="Outils de test camera">
      <button id="camera-test-button" class="camera-test-button" type="button">Test Camera</button>
      <button id="native-capture-button" class="camera-test-button" type="button">Capture HTML</button>
      <button id="camera-debug-close" class="camera-debug-close" type="button">Fermer debug</button>
    </div>
    <div id="camera-debug-panel" class="camera-debug-panel" aria-live="polite">
      <video id="camera-debug-video" class="camera-debug-video" playsinline muted autoplay></video>
      <pre id="camera-debug-output" class="camera-debug-output">Camera debug pret.</pre>
    </div>
    <script>
      (function installCameraDebugTools() {
        const output = document.getElementById("camera-debug-output");
        const video = document.getElementById("camera-debug-video");
        const testButton = document.getElementById("camera-test-button");
        const nativeCaptureButton = document.getElementById("native-capture-button");
        const closeButton = document.getElementById("camera-debug-close");
        let testStream = null;

        function stopTestCameraStream() {
          if (!testStream) return;
          for (const track of testStream.getTracks()) track.stop();
          testStream = null;
          if (video) video.srcObject = null;
        }

        async function readCameraPermission() {
          if (!navigator.permissions || !navigator.permissions.query) {
            return "navigator.permissions indisponible";
          }
          try {
            const result = await navigator.permissions.query({ name: "camera" });
            return result && result.state ? result.state : "etat inconnu";
          } catch (err) {
            return `${err.name || "Error"}: ${err.message || err}`;
          }
        }

        async function collectCameraDiagnostics(label, err, extra) {
          const mediaDevices = navigator.mediaDevices;
          const videoInputs = [];
          if (mediaDevices && mediaDevices.enumerateDevices) {
            try {
              const devices = await mediaDevices.enumerateDevices();
              for (const device of devices) {
                if (device && device.kind === "videoinput") {
                  videoInputs.push({
                    kind: device.kind,
                    label: device.label || "(label masque avant permission)",
                    deviceId: device.deviceId ? "present" : "absent"
                  });
                }
              }
            } catch (devicesErr) {
              videoInputs.push({
                error: `${devicesErr.name || "Error"}: ${devicesErr.message || devicesErr}`
              });
            }
          }

          return {
            label,
            date: new Date().toISOString(),
            href: location.href,
            protocol: location.protocol,
            hostname: location.hostname,
            isSecureContext: window.isSecureContext,
            hasNavigatorMediaDevices: Boolean(mediaDevices),
            hasGetUserMedia: Boolean(mediaDevices && mediaDevices.getUserMedia),
            permissionCamera: await readCameraPermission(),
            userAgent: navigator.userAgent,
            videoInputs,
            error: err
              ? {
                  name: err.name || "Error",
                  message: err.message || String(err),
                  constraint: err.constraint || err.constraintName || "",
                  stack: err.stack || ""
                }
              : null,
            extra: extra || null
          };
        }

        async function showCameraDebug(label, err, extra) {
          const diagnostics = await collectCameraDiagnostics(label, err, extra);
          document.body.classList.add("camera-debug-open");
          if (output) output.textContent = JSON.stringify(diagnostics, null, 2);
          return diagnostics;
        }

        async function runMinimalCameraTest() {
          stopTestCameraStream();
          document.body.classList.add("camera-debug-open");
          await showCameraDebug("Test Camera: avant getUserMedia", null, {
            constraints: { video: true, audio: false }
          });

          try {
            testStream = await navigator.mediaDevices.getUserMedia({
              video: true,
              audio: false
            });
            if (video) {
              video.srcObject = testStream;
              await video.play();
            }
            const tracks = testStream.getVideoTracks().map(track => ({
              label: track.label,
              readyState: track.readyState,
              settings: track.getSettings ? track.getSettings() : {}
            }));
            await showCameraDebug("Test Camera: succes", null, { tracks });
          } catch (err) {
            await showCameraDebug("Test Camera: echec", err, {
              constraints: { video: true, audio: false }
            });
          }
        }

        if (testButton) {
          testButton.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();
            runMinimalCameraTest();
          });
        }

        if (nativeCaptureButton) {
          nativeCaptureButton.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();
            if (typeof window.captureFace === "function") window.captureFace({ source: "native-html" });
            else showCameraDebug("Capture HTML: window.captureFace indisponible");
          });
        }

        if (closeButton) {
          closeButton.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();
            document.body.classList.remove("camera-debug-open");
            stopTestCameraStream();
          });
        }

        window.CameraDebug = {
          collect: collectCameraDiagnostics,
          show: showCameraDebug,
          stopTestCameraStream,
          runMinimalCameraTest
        };
      })();
    </script>

    <script>
      (function allowZeroAgentsInGui() {
        const previousSetupGUI = setupGUI;
        setupGUI = function setupGUIWithZeroAgentSlider() {
          const result = previousSetupGUI.apply(this, arguments);
          if (window.gui && Array.isArray(window.gui.__controllers)) {
            const agentController = window.gui.__controllers.find(
              controller => controller && controller.property === "agentCount"
            );
            if (agentController && typeof agentController.min === "function") {
              agentController.min(0);
              agentController.updateDisplay();
            }
          }
          return result;
        };
      })();
    </script>
