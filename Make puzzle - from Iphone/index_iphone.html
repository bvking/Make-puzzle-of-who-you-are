<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Surfaces bleutees avec attracteurs - iPhone</title>

    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        background: black;
        touch-action: none;
        overscroll-behavior: none;
      }

      body {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      canvas {
        display: block;
        width: min(100vw, 100vh) !important;
        height: min(100vw, 100vh) !important;
        width: min(100vw, 100dvh) !important;
        height: min(100vw, 100dvh) !important;
        max-width: 100vw;
        max-height: 100dvh;
        touch-action: none;
      }

      .dg.ac {
        transform: scale(0.78);
        transform-origin: top right;
        right: env(safe-area-inset-right);
        top: env(safe-area-inset-top);
        z-index: 20;
      }

      .dg.ac .dg.main {
        max-height: calc(100dvh - 84px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .dg.ac .close-button {
        position: sticky;
        bottom: 0;
        z-index: 2;
      }

      .mobile-ui-active.gui-open .dg.ac {
        transform: none;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        top: max(10px, env(safe-area-inset-top));
        width: auto !important;
        z-index: 80;
      }

      .mobile-ui-active.gui-open .dg.ac .dg.main {
        width: 100% !important;
        max-height: calc(100dvh - 96px - env(safe-area-inset-bottom));
      }

      .mobile-ui-active.gui-open .dg.ac .close-button {
        position: fixed;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(56px, calc(env(safe-area-inset-bottom) + 56px));
        width: auto !important;
        height: 38px;
        line-height: 38px;
        border-radius: 9px;
        background: rgba(7, 10, 14, 0.9);
        color: #fff;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      }

      .iphone-controls {
        position: fixed;
        z-index: 30;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 7px;
        pointer-events: auto;
      }

      .iphone-control-button {
        appearance: none;
        -webkit-appearance: none;
        min-width: 48px;
        height: 38px;
        padding: 0 9px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        background: rgba(7, 10, 14, 0.68);
        color: white;
        font: 600 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .iphone-control-button.is-active,
      .iphone-control-button:active {
        background: rgba(255, 255, 255, 0.9);
        color: black;
      }

      .desktop-save-button {
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <script src="Sqaure%20Mode%20preset.js?v=20260705-who-are-we-v2"></script>
    <script src="capture-face-align.js?v=20260707-face-align-hide-panel-v1"></script>
    <script src="display-photo-extension.js?v=20260706-display-photo-v1"></script>
    <script src="display-photo-background-random-extension.js?v=20260707-bg-random-v2"></script>
    <script>
      (function allowZeroAgentsInGui() {
        const previousSetupGUI = setupGUI;
        setupGUI = function setupGUIWithZeroAgentSlider() {
          const result = previousSetupGUI.apply(this, arguments);
          if (window.gui && Array.isArray(window.gui.__controllers)) {
            const agentController = window.gui.__controllers.find(
              controller => controller && controller.property === "agentCount"
            );
            if (agentController && typeof agentController.min === "function") {
              agentController.min(0);
              agentController.updateDisplay();
            }
          }
          return result;
        };
      })();
    </script>
  </body>
</html>
